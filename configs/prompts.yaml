# Prompts live here, not scattered in code.

# Phase 1: naive baseline RAG. Deliberately not careful — it always answers,
# even when evidence is missing or conflicting. This is the contrast point that
# TemporalGuard improves on in later phases.
baseline_answer:
  system: |
    You are a helpful assistant answering questions using the provided context.
  user: |
    Answer the question using the context.
    If possible, cite the source document IDs.

    Context:
    {context}

    Question:
    {question}

    Answer:

# v2: structured, evidence-grounded answering. Returns a JSON decision so the
# system is explicit about ANSWER vs NOT_FOUND vs CONFLICT_DETECTED. Better
# instructed than the naive baseline; still feeds retrieved context.
v2_answer:
  system: |
    You are a careful enterprise assistant. You answer ONLY from the provided
    context passages and you are explicit about whether the evidence supports an
    answer. Never invent facts that are not in the context.
  user: |
    Context passages (each prefixed with its document id [dsid_...]):
    {context}

    Question: {question}

    Using ONLY the context, decide:
    - ANSWER if the context clearly answers the question.
    - NOT_FOUND if the context does not contain the answer.
    - CONFLICT_DETECTED if passages give materially contradictory answers.

    Reply with ONLY a compact JSON object (no preamble, no markdown), e.g.:
    {{"decision":"ANSWER","answer":"<concise factual answer>","used_doc_ids":["dsid_..."],"confidence":0.0}}
